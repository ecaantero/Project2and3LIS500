<!-- model -->

    <!-- script-->
<script type="text/javascript">

const URL = "https://teachablemachine.withgoogle.com/models/mhCp_3S74/";
let model, webcam, labelContainer, maxPredictions;

// model load 
async function init() {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";
    

    model = await tmImage.load(modelURL, metadataURL); // load model 
    maxPredictions = model.getTotalClasses(); // get predictions 

    const flip = true;
    webcam = new tmImage.Webcam(640, 480, flip); 
    await webcam.setup(); // request camera accesss 
    await webcam.play(); // show video 

    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").appendChild(webcam.canvas); // camera show

    labelContainer = document.getElementById("label-container"); // prediction labels shown 

    for (let i = 0; i < maxPredictions; i++) { 
        labelContainer.appendChild(document.createElement("div"));
    }
}

// main loop for every frame 
async function loop() {
    webcam.update(); // refresh
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {

    const prediction = await model.predict(webcam.canvas); // prediciton results 

    for (let i = 0; i < maxPredictions; i++) {
        const percent = (prediction[i].probability * 100).toFixed(1); // probabily % 
        // output text: class + prediction % is shown 
        const classPrediction = prediction[i].className + ": " + percent + "%";
        labelContainer.childNodes[i].innerHTML = classPrediction;
    }
}

</script>
