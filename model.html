<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cup Classifier AI</title>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- ml5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ml5/0.12.2/ml5.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    p {
      margin: 0 0 10px;
      color: #aaa;
    }

    canvas {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <h1>🥤 Cup Classifier AI</h1>
  <p>Show a white, blue/red, or navy cup to the camera</p>

  <script>
    let video;
    let label = "Loading model...";
    let classifier;

    // IMPORTANT: no trailing slash
    let modelURL = 'https://teachablemachine.withgoogle.com/models/mhCp_3S74';

    function preload() {
      classifier = ml5.imageClassifier(modelURL + '/model.json', modelReady);
    }

    function modelReady() {
      console.log("Model Loaded!");
      classifyVideo();
    }

    function setup() {
      createCanvas(640, 520);

      video = createCapture(VIDEO);
      video.size(640, 480);
      video.hide();
    }

    function classifyVideo() {
      classifier.classify(video, gotResults);
    }

    function draw() {
      background(0);

      // video
      image(video, 0, 0);

      // label text
      fill(255);
      textSize(28);
      textAlign(CENTER, CENTER);
      text(label, width / 2, height - 20);

      // emoji display
      textSize(160);
      let emoji = "☕";

      if (label === "white cup") {
        emoji = "🤍☕";
      } 
      else if (label === "blue/red cup") {
        emoji = "🔵🔴☕";
      } 
      else if (label === "navy cup") {
        emoji = "💙☕";
      }

      text(emoji, width / 2, height / 2);
    }

    function gotResults(error, results) {
      if (error) {
        console.error(error);
        label = "Error loading model";
        return;
      }

      label = results[0].label;
      classifyVideo();
    }
  </script>
</body>
</html>
